# 修改前缀键为 Ctrl+a
unbind C-b
set -g prefix C-a

# 快速重载配置文件
bind p source-file ~/.tmux.conf \; display-message "Config reloaded!"

# ========== 基础设置 ==========
# 设置默认终端，支持真彩色
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g mouse on               # 启用鼠标
set -g history-limit 50000    # 历史回滚行数
set -g focus-events on        # 支持焦点事件
set -g base-index 1           # 窗口编号从 1 开始
setw -g pane-base-index 1     # 面板编号从 1 开始
set -g renumber-windows on    # 关闭窗口后自动重新编号
set -g escape-time 10         # 设置 escape 时间延迟
set -g set-clipboard on       # 复制文本时自动复制到系统剪贴板
set -g allow-passthrough on   # 允许将某些转义序列传递给终端
setw -g aggressive-resize on  # 不同ssh客户端自动调整面板大小
set -g detach-on-destroy off  # 防止意外退出会话
# 复制模式设置为 vi 风格的键位绑定
setw -g mode-keys vi
# v：字符选择
bind -T copy-mode-vi v send -X begin-selection
# y 复制并退出
bind -T copy-mode-vi y send -X copy-selection-and-cancel


# ========== 状态栏设置 ==========
# 状态栏刷新间隔
set -g status-position top        # 状态栏位置
set -g status-interval 5          # 状态栏刷新间隔
set -g status-justify left        # 状态栏对齐方式
set -g status-left-length 40      # 状态栏左对齐长度
set -g status-right-length 100    # 状态栏右对齐长度
set -g window-status-separator "" # 窗口状态分隔符
set -gw automatic-rename on       # 自动重命名面板
# 自动重命名面板格式
set -gw automatic-rename-format '#{b:pane_current_path}'

# ========== 面板相关快捷键 ==========
# 水平分割面板
bind h split-window -v -c "#{pane_current_path}"
# 垂直分割面板
bind v split-window -h -c "#{pane_current_path}"
# 关闭面板
bind x kill-pane

# Ctrl+Alt+方向键：切换面板
bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D

# Ctrl+Alt+Shift+方向键：调整面板大小
bind -n C-M-S-Left resize-pane -L 5
bind -n C-M-S-Down resize-pane -D 5
bind -n C-M-S-Up resize-pane -U 5
bind -n C-M-S-Right resize-pane -R 5


# ========== 面板相关快捷键 ==========
bind r command-prompt -I "#W" "rename-window -- '%%'"
# 前缀键+C：创建新窗口 
bind c new-window -c "#{pane_current_path}"
# 前缀键+K：关闭窗口
bind k kill-window

# Shift+方向键：切换窗口
bind -n S-Left previous-window
bind -n S-Right next-window

# Alt+方向键：切换窗口
bind -n M-Left select-window -t -1
bind -n M-Right select-window -t +1
bind -n M-S-Left swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1

# ========== 会话相关快捷键 ==========
# 前缀键+R：重命名会话
bind R command-prompt -I "#S" "rename-session -- '%%'"
# 前缀键+C：创建新会话
bind C new-session -c "#{pane_current_path}"
# 前缀键+K：关闭会话
bind K kill-session
# 前缀键+P：切换上一个会话
bind P switch-client -p
# 前缀键+N：切换下一个会话
bind N switch-client -n
# Alt+上下方向键：切换会话
bind -n M-Up switch-client -p
bind -n M-Down switch-client -n


# ========== 插件设置 ==========
# 插件管理器
set -g @plugin 'tmux-plugins/tpm' 
# 保存和恢复会话、窗口、面板布局
set -g @plugin 'tmux-plugins/tmux-resurrect'
# 自动定时保存 + 开机自动恢复
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sensible'
# fzf 会话切换（Prefix + F）
set -g @plugin 'sainnhe/tmux-fzf'
set -g @tmux-fzf-launch-key 'F'
# 主题
set -g @plugin 'dracula/tmux'

# continuum 自动保存间隔（分钟）
set -g @continuum-save-interval '10'
# 开机自动恢复最后一次保存的会话
set -g @continuum-restore 'on'

# 主题配置
# 窗口标志
set -g @dracula-show-flags true
# 状态栏刷新频率
set -g @dracula-refresh-rate 3
# 高对比度面板边框
set -g @dracula-border-contrast true
# 启用 powerline 符号
set -g @dracula-show-powerline true


# 初始化插件列表
run '~/.config/tmux/plugins/tpm/tpm'